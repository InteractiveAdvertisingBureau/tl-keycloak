services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: ${KC_DB_URL:-jdbc:postgresql://postgres:5432/keycloak}
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"

  keycloak-api:
    build:
      context: ./keycloak-api
      dockerfile: Dockerfile
    environment:
      PORT: 4000
      NODE_ENV: production
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-master}
      KC_ADMIN_USERNAME: ${KC_ADMIN_USERNAME:-admin}
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_ADMIN_CLIENT_ID: ${KC_ADMIN_CLIENT_ID:-admin-cli}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      AUTH0_CONNECTION: ${AUTH0_CONNECTION:-Username-Password-Authentication}
      AUTH0_SCOPE: ${AUTH0_SCOPE:-openid profile email}
      AUTH0_ACTIONS_SECRET: ${AUTH0_ACTIONS_SECRET:-changeme-actions}
      AUTH0_ISSUER: ${AUTH0_ISSUER:-}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost:4004}
      AUTHZ_BASE_URL: http://authz-service:4001
      KEYCLOAK_ROPG_CLIENT_ID: ${KEYCLOAK_ROPG_CLIENT_ID:-}
      KEYCLOAK_ROPG_CLIENT_SECRET: ${KEYCLOAK_ROPG_CLIENT_SECRET:-}
    ports:
      - "${KEYCLOAK_API_HOST_PORT:-4004}:4000"
    depends_on:
      - keycloak
      - authz-service
    restart: on-failure

  authz-service:
    build:
      context: ./authz-service
      dockerfile: Dockerfile
    environment:
      PORT: 4001
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-authz}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-authz}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-authz}
      AUTHZ_ADMIN_SUB: ${AUTHZ_ADMIN_SUB:-auth0|demo-admin-sub}
      AUTHZ_ADMIN_EMAIL: ${AUTHZ_ADMIN_EMAIL:-admin@example.com}
    ports:
      - "4001:4001"

  mock-service:
    build:
      context: ./mock-service
      dockerfile: Dockerfile
    environment:
      PORT: 4002
    ports:
      - "4002:4002"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    environment:
      PORT: 3000
      NODE_ENV: production
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_ISSUER: ${AUTH0_ISSUER:-}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      AUTH0_REDIRECT_URI: ${AUTH0_REDIRECT_URI:-http://localhost:4010/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4003}
      APP_BASE_PATH: ${APP_BASE_PATH:-}
      KEYCLOAK_API_URL: http://keycloak-api:4000
      AUTHZ_BASE_URL: http://authz-service:4001
      # If unset, gateway derives JWKS URL from token iss (realm) + internal Keycloak base (Docker DNS).
      KEYCLOAK_INTERNAL_BASE_URL: ${KEYCLOAK_INTERNAL_BASE_URL:-http://keycloak:8080}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_JWKS_URI:-}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-}
      MOCK_SERVICE_URL: http://mock-service:4002
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      # Optional production: comma-separated public hostnames; empty = no Host check (see docs/architecture.md).
      GATEWAY_ALLOWED_HOSTS: ${GATEWAY_ALLOWED_HOSTS:-}
      GATEWAY_TRUST_PROXY: ${GATEWAY_TRUST_PROXY:-}
    ports:
      - "${GATEWAY_HOST_PORT:-4010}:3000"
    depends_on:
      - authz-service
      - mock-service
      - keycloak-api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_GATEWAY_BASE_URL: ${VITE_GATEWAY_BASE_URL:-http://localhost:4010}
        # If VITE_* are unset, reuse root .env Auth0 vars so one place configures the stack.
        VITE_AUTH0_DOMAIN: ${VITE_AUTH0_DOMAIN:-${AUTH0_DOMAIN:-}}
        VITE_AUTH0_CLIENT_ID: ${VITE_AUTH0_CLIENT_ID:-${AUTH0_CLIENT_ID:-}}
        VITE_AUTH0_AUDIENCE: ${VITE_AUTH0_AUDIENCE:-${AUTH0_AUDIENCE:-}}
        VITE_AUTH0_REDIRECT_URI: ${VITE_AUTH0_REDIRECT_URI:-http://localhost:4010/callback}
    ports:
      - "${FRONTEND_HOST_PORT:-4003}:80"
    depends_on:
      - api-gateway
